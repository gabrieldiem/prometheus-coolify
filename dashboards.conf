# Grafana dashboard configuration
#
# Format:
#   grafana <id> <output_filename> [title]
#   url     <raw_url> <output_filename> [title]
#
# grafana entries are downloaded from grafana.com by dashboard ID.
# url entries are fetched from a raw URL (e.g. GitHub raw content).
# Titles are optional — if omitted, the dashboard's original title is kept.
#
# Add your own dashboards below. Example URL-based entry:
#   url https://raw.githubusercontent.com/seaweedfs/seaweedfs/master/other/metrics/grafana_seaweedfs.json seaweedfs.json "SeaweedFS"

grafana 1860    node-exporter-linux-info.json                       "Node-exporter: Linux Info (1860)"
grafana 19908   cadvisor-general-cpu-absolute.json                  "CAdvisor: General [CPU absolute] (19908)"
grafana 14282   cadvisor-general-memory-io-cpu-aggregate.json       "CAdvisor: General [Memory + IO + CPU aggregate] (14282)"
grafana 19792   cadvisor-per-container-info.json                    "CAdvisor: Per Container Info (19792)"
